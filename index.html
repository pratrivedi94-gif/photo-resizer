
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Govt Exam Utility - Photo Resizer & Image to PDF</title>
    <!-- jsPDF Library for Image to PDF -->
    <meta name="google-site-verification" content="e2fJMe5fYvZynR7M0m3BwhzSJntsBnApq1tH0GmAdzQ" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 20px; font-size: 22px; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: bold; color: #666; transition: 0.3s; }
        .tab.active { color: #1a73e8; border-bottom: 3px solid #1a73e8; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input[type="file"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        .preview-box { margin-top: 20px; text-align: center; display: none; }
        .preview-box img { max-width: 100%; height: auto; border-radius: 6px; margin-bottom: 10px; border: 1px solid #ddd; }
        .info { font-size: 13px; color: #28a745; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Govt Exam Photo & PDF Tool</h2>
    
    <!-- Tab Navigation -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('resizer')">🖼️ Photo Resizer</div>
        <div class="tab" onclick="switchTab('pdf')">📄 Image to PDF</div>
    </div>

    <!-- Section 1: Photo Resizer -->
    <div id="resizer" class="tab-content active">
        <div class="input-group">
            <label>Select Photo (JPG/PNG):</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="input-group">
            <label>Target Size (KB):</label>
            <input type="number" id="targetKb" value="50" min="5" max="5000">
        </div>
        <button onclick="resizeImage()">Resize & Compress</button>

        <div id="resizeResult" class="preview-box">
            <div id="fileInfo" class="info"></div>
            <img id="previewImg" src="" alt="Resized Preview">
            <a id="downloadLink" href="" download="resized-photo.jpg"><button style="background-color: #28a745;">Download Photo</button></a>
        </div>
    </div>

    <!-- Section 2: Image to PDF -->
    <div id="pdf" class="tab-content">
        <div class="input-group">
            <label>Select Image to Convert to PDF:</label>
            <input type="file" id="pdfImageInput" accept="image/*">
        </div>
        <button onclick="convertToPDF()">Convert to PDF</button>

        <div id="pdfResult" class="preview-box">
            <div class="info" style="color: #1a73e8;">PDF Generated Successfully!</div>
            <button onclick="downloadPDF()" style="background-color: #dc3545;">Download PDF File</button>
        </div>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    // Photo Resizer Logic
    function resizeImage() {
        const fileInput = document.getElementById('imageInput');
        const targetKb = document.getElementById('targetKb').value;
        if (!fileInput.files[0]) { alert('Please select an image!'); return; }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;

            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                let quality = 0.9;
                let dataUrl = canvas.toDataURL('image/jpeg', quality);

                while (dataUrl.length / 1024 > targetKb && quality > 0.05) {
                    quality -= 0.05;
                    dataUrl = canvas.toDataURL('image/jpeg', quality);
                }

                document.getElementById('previewImg').src = dataUrl;
                document.getElementById('fileInfo').innerText = `New Size: ~${Math.round(dataUrl.length / 1024)} KB`;
                document.getElementById('downloadLink').href = dataUrl;
                document.getElementById('resizeResult').style.display = 'block';
            };
        };
        reader.readAsDataURL(file);
    }

    // Image to PDF Logic
    let pdfDoc = null;
    function convertToPDF() {
        const fileInput = document.getElementById('pdfImageInput');
        if (!fileInput.files[0]) { alert('Please select an image!'); return; }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;

            img.onload = function() {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();
                
                const imgWidth = 190;
                const imgHeight = (img.height * imgWidth) / img.width;

                pdf.addImage(img.src, 'JPEG', 10, 10, imgWidth, imgHeight);
                pdfDoc = pdf;

                document.getElementById('pdfResult').style.display = 'block';
            };
        };
        reader.readAsDataURL(file);
    }

    function downloadPDF() {
        if (pdfDoc) {
            pdfDoc.save('converted-document.pdf');
        }
    }
</script>

</body>
</html>
